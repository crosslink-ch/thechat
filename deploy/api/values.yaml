serviceAccount:
  # Annotations to add (e.g., eks.amazonaws.com/role-arn for IRSA)
  annotations: {}

replicaCount: 1

image:
  repository: ghcr.io/crosslink-ch/thechat-api
  tag: latest
  pullPolicy: IfNotPresent

migrateImage:
  repository: ghcr.io/crosslink-ch/thechat-api-migrate
  tag: latest
  pullPolicy: IfNotPresent

# Name of an existing Kubernetes Secret containing DATABASE_URL
# The secret must have a key called DATABASE_URL
databaseSecret: thechat-db

# Name of an existing Kubernetes Secret containing JWT_SECRET
jwtSecret: thechat-jwt

# Name of a Kubernetes Secret containing REDIS_URL.
# When redis.enabled=true, this chart creates the secret.
# Required when REALTIME_DRIVER=redis or BullMQ workers are enabled.
redisSecret: thechat-redis

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Optional external Kafka configuration for the worker. This chart never
# deploys Kafka. Leave these empty while DOMAIN_EVENTS_DRIVER=outbox.
kafka:
  # Comma-separated broker endpoints. Prefer existingSecret in production.
  brokers: ""
  # Existing Secret containing KAFKA_BROKERS.
  existingSecret: ""
  brokersSecretKey: KAFKA_BROKERS
  # Optional existing Secret containing KAFKA_SASL_MECHANISM,
  # KAFKA_SASL_USERNAME, and KAFKA_SASL_PASSWORD.
  saslSecret: ""

# Name of an existing Kubernetes Secret for SMTP credentials (optional)
# Expected keys: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
# Set to "" to disable
smtpSecret: ""

# Name of an existing Kubernetes Secret for Postmark (optional)
# Expected key: POSTMARK_API_TOKEN
# Set to "" to disable
postmarkSecret: ""

env:
  THECHAT_BACKEND_PORT: "3000"
  THECHAT_BACKEND_URL: "https://api.thechat.app"
  REALTIME_DRIVER: "redis"
  REDIS_KEY_PREFIX: "thechat"
  ASYNC_WORKER_CONCURRENCY: "4"
  DOMAIN_EVENTS_DRIVER: "outbox"
  DOMAIN_EVENTS_MAX_ATTEMPTS: "25"
  DOMAIN_EVENTS_LOCK_TIMEOUT_MS: "300000"
  KAFKA_CLIENT_ID: "thechat-worker"
  KAFKA_TOPIC: "thechat.domain-events.v1"
  KAFKA_DEAD_LETTER_TOPIC: "thechat.domain-events.v1.dlq"
  KAFKA_AUTO_CREATE_TOPICS: "false"
  KAFKA_FROM_BEGINNING: "true"
  KAFKA_CONSUMER_GROUP: "thechat-message-events-v1"
  KAFKA_SSL: "false"
  EMAIL_PROVIDER: "smtp"
  EMAIL_FROM: "noreply@thechat.app"
  REQUIRE_EMAIL_VERIFICATION: "false"
  LOG_LEVEL: "info"

worker:
  enabled: true
  replicaCount: 1
  command:
    - bun
    - run
    - dist/scripts/worker.js
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
      cpu: 1000m

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.thechat.app
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 1Gi
    cpu: 1500m

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
