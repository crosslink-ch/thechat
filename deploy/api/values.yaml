serviceAccount:
  name: ""
  # Annotations to add (e.g., eks.amazonaws.com/role-arn for IRSA)
  annotations: {}

replicaCount: 1

# Use the same immutable tag for image and migrateImage in production.
image:
  repository: ghcr.io/crosslink-ch/thechat-api
  tag: latest
  pullPolicy: IfNotPresent

migrateImage:
  repository: ghcr.io/crosslink-ch/thechat-api-migrate
  tag: latest
  pullPolicy: IfNotPresent

migrationJob:
  # Helm waits for this pre-install/pre-upgrade hook before changing workloads.
  activeDeadlineSeconds: 300
  backoffLimit: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Name of an existing Kubernetes Secret containing DATABASE_URL
# The secret must have a key called DATABASE_URL
databaseSecret: thechat-db

# Name of an existing Kubernetes Secret containing JWT_SECRET
jwtSecret: thechat-jwt

# Name of a Kubernetes Secret containing REDIS_URL.
# When redis.enabled=true, this chart creates the secret.
# Required when REALTIME_DRIVER=redis or BullMQ workers are enabled.
redisSecret: thechat-redis

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Name of an existing Kubernetes Secret for SMTP credentials (optional)
# Expected keys: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
# Set to "" to disable
smtpSecret: ""

# Name of an existing Kubernetes Secret for Postmark (optional)
# Expected key: POSTMARK_API_TOKEN
# Set to "" to disable
postmarkSecret: ""

env:
  THECHAT_BACKEND_PORT: "3000"
  THECHAT_BACKEND_URL: "https://api.thechat.app"
  REALTIME_DRIVER: "redis"
  REDIS_KEY_PREFIX: "thechat"
  ASYNC_WORKER_CONCURRENCY: "4"
  EMAIL_PROVIDER: "smtp"
  EMAIL_FROM: "noreply@thechat.app"
  REQUIRE_EMAIL_VERIFICATION: "false"
  LOG_LEVEL: "info"
  ATTACHMENT_S3_BUCKET: ""
  ATTACHMENT_S3_REGION: "eu-central-1"
  ATTACHMENT_S3_FORCE_PATH_STYLE: "false"
  ATTACHMENT_UNATTACHED_TTL_SECONDS: "2592000"
  ATTACHMENT_VALIDATION_CONCURRENCY: "1"

worker:
  enabled: true
  replicaCount: 1
  serviceAccount:
    create: true
    name: ""
    # Bind the worker-only S3 role here. Do not reuse the API role.
    annotations: {}
  command:
    - bun
    - run
    - dist/scripts/worker.js
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
      cpu: 1000m
  clamav:
    enabled: true
    serviceAccount:
      create: true
      name: ""
    networkPolicy:
      enabled: true
    image:
      repository: clamav/clamav
      tag: "1.4"
      pullPolicy: IfNotPresent
    port: 3310
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.thechat.app
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 1Gi
    cpu: 1500m

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
