{{- $domainEventsDriver := default "outbox" (index .Values.env "DOMAIN_EVENTS_DRIVER") -}}
{{- $kafkaTopic := default "thechat.domain-events.v1" (index .Values.env "KAFKA_TOPIC") -}}
{{- $kafkaDeadLetterTopic := default "thechat.domain-events.v1.dlq" (index .Values.env "KAFKA_DEAD_LETTER_TOPIC") -}}
{{- if and .Values.worker.enabled (eq $domainEventsDriver "kafka") (not .Values.kafka.brokers) (not .Values.kafka.existingSecret) -}}
{{- fail "worker DOMAIN_EVENTS_DRIVER=kafka requires kafka.brokers or kafka.existingSecret" -}}
{{- end -}}
{{- if and .Values.worker.enabled (eq $domainEventsDriver "kafka") (eq $kafkaTopic $kafkaDeadLetterTopic) -}}
{{- fail "KAFKA_TOPIC and KAFKA_DEAD_LETTER_TOPIC must differ" -}}
{{- end -}}
{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thechat-api.workerFullname" . }}
  labels:
    {{- include "thechat-api.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  # Recreate prevents old outbox-mode and new Kafka-mode workers from
  # overlapping during a driver cutover.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "thechat-api.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thechat-api.workerSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "thechat-api.fullname" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          env:
            {{- include "thechat-api.env" . | trim | nindent 12 }}
            {{- include "thechat-api.kafkaEnv" . | trim | nindent 12 }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
