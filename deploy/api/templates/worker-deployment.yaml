{{- $defaultClamav := dict "enabled" true "port" 3310 -}}
{{- $clamav := mergeOverwrite (deepCopy $defaultClamav) (.Values.worker.clamav | default dict) -}}
{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thechat-api.workerFullname" . }}
  labels:
    {{- include "thechat-api.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "thechat-api.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thechat-api.workerSelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "thechat-api.workerServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "dist/scripts/worker.js"]
          env:
            {{- include "thechat-api.env" . | nindent 12 }}
            {{- if $clamav.enabled }}
            - name: CLAMAV_HOST
              value: {{ include "thechat-api.clamavFullname" . | quote }}
            - name: CLAMAV_PORT
              value: {{ $clamav.port | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
