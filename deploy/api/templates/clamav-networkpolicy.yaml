{{- $clamav := .Values.worker.clamav | default dict -}}
{{- $networkPolicy := get $clamav "networkPolicy" | default dict -}}
{{- if and .Values.worker.enabled (get $clamav "enabled") (get $networkPolicy "enabled") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "thechat-api.clamavFullname" . }}
  labels:
    {{- include "thechat-api.clamavLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "thechat-api.clamavSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "thechat-api.workerSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $clamav.port }}
{{- end }}
