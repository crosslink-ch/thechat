{{- $clamav := .Values.worker.clamav | default dict -}}
{{- if and .Values.worker.enabled (get $clamav "enabled") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "thechat-api.clamavFullname" . }}
  labels:
    {{- include "thechat-api.clamavLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "thechat-api.clamavSelectorLabels" . | nindent 4 }}
  ports:
    - name: clamav
      port: {{ $clamav.port }}
      targetPort: clamav
      protocol: TCP
{{- end }}
