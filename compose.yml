name: thechat

services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    environment:
      GF_PATHS_PROVISIONING: /otel-lgtm/grafana/conf/provisioning
    ports:
      - "${GRAFANA_PORT:-13300}:3000"
      - "${OTEL_GRPC_PORT:-14317}:4317"
      - "${OTEL_HTTP_PORT:-14318}:4318"
    volumes:
      - otel-lgtm-data:/data
      - ./deployment/local/grafana/provisioning/dashboards/thechat.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/thechat.yml:ro
      - ./deployment/local/grafana/dashboards:/otel-lgtm/thechat-dashboards:ro

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    depends_on:
      - otel-lgtm
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./deployment/local/promtail.yml:/etc/promtail/config.yml:ro
      - ${THECHAT_DEV_LOGS_DIR:-./.tmp}:/var/log/thechat:ro
      - promtail-data:/var/lib/promtail

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thechat}
      POSTGRES_DB: ${POSTGRES_DB:-thechat}
    ports:
      - "${POSTGRES_PORT:-15543}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
    ports:
      - "${REDIS_PORT:-16380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka:
    image: apache/kafka:4.3.1
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-19092}:19092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:9092,PLAINTEXT_HOST://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

volumes:
  otel-lgtm-data:
  promtail-data:
  postgres-data:
  redis-data:
  kafka-data:
