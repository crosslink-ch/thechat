name: thechat

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thechat}
      POSTGRES_DB: ${POSTGRES_DB:-thechat}
    ports:
      - "${POSTGRES_PORT:-15543}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
