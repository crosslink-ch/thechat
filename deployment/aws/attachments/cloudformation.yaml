AWSTemplateFormatVersion: "2010-09-09"
Description: Private development attachment storage and split least-privilege canary roles for TheChat

Parameters:
  BucketName:
    Type: String
    Description: Globally unique development attachment bucket name
  TrustedPrincipalArn:
    Type: String
    Description: IAM principal allowed to assume the bucket-scoped development roles
  CleanObjectRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    Description: Days to retain attached clean object versions

Resources:
  AttachmentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - Id: TheChatDevelopmentClients
            AllowedOrigins:
              - http://localhost:1420
              - http://127.0.0.1:1420
              - http://tauri.localhost
              - https://tauri.localhost
            AllowedMethods:
              - GET
              - HEAD
              - PUT
            AllowedHeaders:
              - Content-Type
              - If-None-Match
              - x-amz-checksum-sha256
              - x-amz-content-sha256
              - x-amz-date
              - x-amz-security-token
            ExposedHeaders:
              - ETag
              - x-amz-version-id
              - x-amz-checksum-sha256
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: ExpireQuarantineObjects
            Status: Enabled
            Prefix: quarantine/
            ExpirationInDays: 1
            NoncurrentVersionExpiration:
              NoncurrentDays: 1
          - Id: ExpireCleanObjects
            Status: Enabled
            Prefix: clean/
            ExpirationInDays: !Ref CleanObjectRetentionDays
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            Prefix: ""
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: application
          Value: thechat
        - Key: environment
          Value: development
        - Key: managed-by
          Value: cloudformation
        - Key: data-classification
          Value: private-user-content

  AttachmentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AttachmentsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt AttachmentsBucket.Arn
              - !Sub "${AttachmentsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"
          - Sid: DenyStalePresignedRequests
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource: !Sub "${AttachmentsBucket.Arn}/*"
            Condition:
              StringEquals:
                s3:authType: REST-QUERY-STRING
              NumericGreaterThan:
                s3:signatureAge: "600000"

  DevelopmentApplicationRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Bucket-scoped role for local TheChat attachment development and integration tests
      MaxSessionDuration: 14400
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TheChatDevelopmentAttachmentObjects
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadBucketMetadata
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource: !GetAtt AttachmentsBucket.Arn
              - Sid: ListManagedDevelopmentPrefixes
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !GetAtt AttachmentsBucket.Arn
                Condition:
                  StringLike:
                    s3:prefix:
                      - quarantine/*
                      - clean/*
                      - integration-tests/*
              - Sid: ManageDevelopmentAttachmentObjects
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetObjectAttributes
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:PutObjectTagging
                  - s3:GetObjectTagging
                Resource:
                  - !Sub "${AttachmentsBucket.Arn}/quarantine/*"
                  - !Sub "${AttachmentsBucket.Arn}/clean/*"
                  - !Sub "${AttachmentsBucket.Arn}/integration-tests/*"
      Tags:
        - Key: application
          Value: thechat
        - Key: environment
          Value: development
        - Key: managed-by
          Value: cloudformation

  AttachmentApiRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Least-privilege API canary role; production workloads need environment-specific trust
      MaxSessionDuration: 14400
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TheChatAttachmentApiObjects
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReserveQuarantineUploads
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${AttachmentsBucket.Arn}/quarantine/*"
              - Sid: VerifyQuarantineAndAuthorizeCleanReads
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource:
                  - !Sub "${AttachmentsBucket.Arn}/quarantine/*"
                  - !Sub "${AttachmentsBucket.Arn}/clean/*"
      Tags:
        - Key: application
          Value: thechat
        - Key: workload
          Value: api
        - Key: environment
          Value: development
        - Key: managed-by
          Value: cloudformation

  AttachmentWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Least-privilege worker canary role; production workloads need environment-specific trust
      MaxSessionDuration: 14400
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TheChatAttachmentWorkerObjects
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ScanQuarantineAndVerifyCleanVersions
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource:
                  - !Sub "${AttachmentsBucket.Arn}/quarantine/*"
                  - !Sub "${AttachmentsBucket.Arn}/clean/*"
              - Sid: PromoteCleanObjects
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${AttachmentsBucket.Arn}/clean/*"
              - Sid: DeleteExactAttachmentVersions
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub "${AttachmentsBucket.Arn}/quarantine/*"
                  - !Sub "${AttachmentsBucket.Arn}/clean/*"
      Tags:
        - Key: application
          Value: thechat
        - Key: workload
          Value: attachment-worker
        - Key: environment
          Value: development
        - Key: managed-by
          Value: cloudformation

Outputs:
  BucketName:
    Description: Development attachment bucket
    Value: !Ref AttachmentsBucket
  BucketArn:
    Description: Development attachment bucket ARN
    Value: !GetAtt AttachmentsBucket.Arn
  Region:
    Description: Bucket region
    Value: !Ref AWS::Region
  DevelopmentRoleArn:
    Description: Broad bucket-scoped role for local development and integration tests
    Value: !GetAtt DevelopmentApplicationRole.Arn
  AttachmentApiRoleArn:
    Description: Canary role whose policy should be mirrored onto the production API workload role
    Value: !GetAtt AttachmentApiRole.Arn
  AttachmentWorkerRoleArn:
    Description: Canary role whose policy should be mirrored onto the production worker workload role
    Value: !GetAtt AttachmentWorkerRole.Arn
