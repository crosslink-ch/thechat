<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>TheChat</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Connect to standalone React DevTools in development (non-blocking).
      // Uses fetch with a short timeout so the app isn't blocked when DevTools isn't running.
      if (location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "tauri:") {
        try {
          const controller = new AbortController();
          setTimeout(() => controller.abort(), 300);
          fetch("http://localhost:8097", { signal: controller.signal, mode: "no-cors" })
            .then(() => {
              const s = document.createElement("script");
              s.src = "http://localhost:8097";
              document.head.appendChild(s);
            })
            .catch(() => {});
        } catch (_) {}
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
