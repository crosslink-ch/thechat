name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Bundle Node.js runtime
        shell: bash
        run: |
          NODE_VERSION=24.14.1
          RESOURCES_DIR=packages/desktop/src-tauri/resources/node

          if [ "$RUNNER_OS" = "Linux" ]; then
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
              | tar xJ --strip-components=1 -C "$RESOURCES_DIR"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            if echo "${{ matrix.args }}" | grep -q "aarch64"; then
              ARCH=arm64
            else
              ARCH=x64
            fi
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-${ARCH}.tar.gz" \
              | tar xz --strip-components=1 -C "$RESOURCES_DIR"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            curl -fsSLo "$RUNNER_TEMP/node.zip" \
              "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip"
            7z x "$RUNNER_TEMP/node.zip" -o"$RUNNER_TEMP/node-extract" -y > /dev/null
            mv "$RUNNER_TEMP/node-extract/node-v${NODE_VERSION}-win-x64/"* "$RESOURCES_DIR/"
          fi

          # Remove files not needed at runtime
          rm -rf "$RESOURCES_DIR/include" "$RESOURCES_DIR/share" \
                 "$RESOURCES_DIR/CHANGELOG.md" "$RESOURCES_DIR/README.md" "$RESOURCES_DIR/LICENSE"

          # On Unix, npm/npx are symlinks that may not survive bundling.
          # Replace them with small wrapper scripts that invoke the bundled node.
          if [ "$RUNNER_OS" != "Windows" ]; then
            for cmd in npm npx; do
              LINK="$RESOURCES_DIR/bin/$cmd"
              if [ -L "$LINK" ]; then
                TARGET=$(readlink "$LINK")
                rm "$LINK"
                printf '#!/bin/sh\nexec "$(dirname "$0")/node" "$(dirname "$0")/%s" "$@"\n' "$TARGET" > "$LINK"
                chmod +x "$LINK"
              fi
            done
            # corepack is not needed
            rm -f "$RESOURCES_DIR/bin/corepack"
            rm -rf "$RESOURCES_DIR/lib/node_modules/corepack"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          THECHAT_BACKEND_URL: https://thechat.testkopie.dev
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "TheChat ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}
